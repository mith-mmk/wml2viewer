name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: test workspace
        run: cargo test --workspace

      - name: check examples
        run: cargo check --workspace --examples

  cross-check:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: install clang for windows arm
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: choco install llvm -y --no-progress

      - name: install gcc for linux arm
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: cross target check (windows arm)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $env:CC_aarch64_pc_windows_msvc = "clang-cl"
          cargo check --target ${{ matrix.target }}

      - name: cross target check (linux arm)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc cargo check --target ${{ matrix.target }}

      - name: cross target check
        if: matrix.target != 'aarch64-pc-windows-msvc' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo check --target ${{ matrix.target }}
